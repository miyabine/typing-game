<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語タイピングゲーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #game { background: #fff; border-radius: 12px; padding: 2rem; max-width: 520px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { text-align: center; font-size: 1.2rem; color: #555; margin-bottom: 1.5rem; font-weight: 500; }
    #stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: #f9f9f9; border-radius: 8px; padding: 0.75rem; text-align: center; }
    .stat-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .stat-value { font-size: 1.4rem; font-weight: 500; color: #333; }
    #word-display { font-size: 2.5rem; font-weight: 500; text-align: center; color: #222; margin: 1.5rem 0; letter-spacing: 0.1em; min-height: 60px; }
    #romaji-hint { text-align: center; font-size: 1rem; min-height: 1.5rem; font-family: monospace; letter-spacing: 0.05em; margin-bottom: 0.5rem; color: #22a06b; }
    #message { text-align: center; font-size: 1rem; min-height: 1.5rem; color: #999; margin-bottom: 1rem; }
    #message.correct { color: #22a06b; }
    #typing-input { width: 100%; font-size: 1.2rem; padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; margin-bottom: 1rem; }
    #typing-input:focus { outline: none; border-color: #aaa; }
    #typing-input.shake { animation: shake 0.18s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    #start-btn { display: block; width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; }
    #start-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div id="game">
  <h1>日本語タイピングゲーム</h1>
  <div id="stats">
    <div class="stat-card"><div class="stat-label">正解数</div><div class="stat-value" id="score">0</div></div>
    <div class="stat-card"><div class="stat-label">ミス</div><div class="stat-value" id="miss">0</div></div>
    <div class="stat-card"><div class="stat-label">正確率</div><div class="stat-value" id="accuracy">-</div></div>
  </div>
  <div id="word-display">スタートしよう！</div>
  <div id="romaji-hint"></div>
  <div id="message"></div>
  <input type="text" id="typing-input" placeholder="ローマ字で入力..." disabled autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  <button id="start-btn">スタート</button>
</div>

<script>
const rawMap = {
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
  'さ':'sa','し':['si','shi'],'す':'su','せ':'se','そ':'so',
  'た':'ta','ち':['ti','chi'],'つ':['tu','tsu'],'て':'te','と':'to',
  'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
  'は':'ha','ひ':'hi','ふ':['fu','hu'],'へ':'he','ほ':'ho',
  'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
  'や':'ya','ゆ':'yu','よ':'yo',
  'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
  'わ':'wa','を':['wo','o'],'ん':['n','nn'],
  'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
  'ざ':'za','じ':['ji','zi'],'ず':'zu','ぜ':'ze','ぞ':'zo',
  'だ':'da','ぢ':['di','ji'],'づ':['du','zu'],'で':'de','ど':'do',
  'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
  'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
  'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
  'しゃ':['sha','sya'],'しゅ':['shu','syu'],'しょ':['sho','syo'],
  'ちゃ':['cha','tya'],'ちゅ':['chu','tyu'],'ちょ':['cho','tyo'],
  'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
  'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
  'みゃ':'mya','みゅ':'myu','みょ':'myo',
  'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
  'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
  'じゃ':['ja','jya','zya'],'じゅ':['ju','jyu','zyu'],'じょ':['jo','jyo','zyo'],
  'びゃ':'bya','びゅ':'byu','びょ':'byo',
  'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
};

const kanaMap = {};
Object.keys(rawMap).forEach(k => {
  kanaMap[k] = Array.isArray(rawMap[k]) ? rawMap[k] : [rawMap[k]];
});

function getNextOptions(kana, ki) {
  const opts = [];
  if (ki + 1 < kana.length && kanaMap[kana[ki]+kana[ki+1]]) {
    opts.push({ roms: kanaMap[kana[ki]+kana[ki+1]], nextKi: ki+2 });
  }
  if (ki < kana.length && kanaMap[kana[ki]]) {
    opts.push({ roms: kanaMap[kana[ki]], nextKi: ki+1 });
  }
  return opts;
}

function tryRom(kana, nextKi, typed, ti, rom) {
  for (let j = 0; j < rom.length; j++) {
    if (ti + j >= typed.length) return 'prefix';
    if (typed[ti + j] !== rom[j]) return 'invalid';
  }
  return check(kana, nextKi, typed, ti + rom.length);
}

function check(kana, ki, typed, ti) {
  if (ti === typed.length) return ki === kana.length ? 'complete' : 'prefix';
  if (ki === kana.length) return 'invalid';
  if (kana[ki] === 'っ') {
    for (const { roms, nextKi } of getNextOptions(kana, ki+1)) {
      for (const rom of roms) {
        if (!rom[0].match(/[a-z]/)) continue;
        const r = tryRom(kana, nextKi, typed, ti, rom[0] + rom);
        if (r !== 'invalid') return r;
      }
    }
    return 'invalid';
  }
  if (ki + 1 < kana.length && kanaMap[kana[ki]+kana[ki+1]]) {
    for (const rom of kanaMap[kana[ki]+kana[ki+1]]) {
      const r = tryRom(kana, ki+2, typed, ti, rom);
      if (r !== 'invalid') return r;
    }
  }
  if (kanaMap[kana[ki]]) {
    for (const rom of kanaMap[kana[ki]]) {
      const r = tryRom(kana, ki+1, typed, ti, rom);
      if (r !== 'invalid') return r;
    }
  }
  return 'invalid';
}

const words = [
  "りんご","ねこ","いぬ","さくら","やま","うみ","そら","はな","きもの","とけい",
  "でんしゃ","たべもの","おかあさん","がっこう","としょかん","にほんご","ともだち",
  "しごと","あさごはん","おんがく","ちょうちょ","しょくじ","りょこう","にんじゃ",
];

let current = null, typed = '', score = 0, miss = 0, active = false, queue = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function nextWord() {
  if (!queue.length) queue = shuffle(words);
  current = queue.pop(); typed = '';
  document.getElementById('word-display').textContent = current;
  document.getElementById('romaji-hint').textContent = '';
  document.getElementById('message').textContent = '';
  document.getElementById('message').className = '';
  document.getElementById('typing-input').value = '';
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('miss').textContent = miss;
  const total = score + miss;
  document.getElementById('accuracy').textContent = total > 0 ? Math.round(score/total*100)+'%' : '-';
}

function shakeInput() {
  const el = document.getElementById('typing-input');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
}

document.getElementById('typing-input').addEventListener('keydown', e => {
  if (!active || !current || e.key.length > 1) return;
  e.preventDefault();
  const candidate = typed + e.key.toLowerCase();
  const result = check(current, 0, candidate, 0);
  if (result === 'invalid') { miss++; updateStats(); shakeInput(); return; }
  typed = candidate;
  document.getElementById('typing-input').value = typed;
  document.getElementById('romaji-hint').textContent = typed;
  if (result === 'complete') {
    score++; updateStats();
    document.getElementById('message').textContent = '正解！';
    document.getElementById('message').className = 'correct';
    setTimeout(() => nextWord(), 400);
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  score = 0; miss = 0; typed = ''; updateStats();
  document.getElementById('accuracy').textContent = '-';
  active = true; queue = shuffle(words); nextWord();
  document.getElementById('typing-input').disabled = false;
  document.getElementById('typing-input').focus();
  document.getElementById('start-btn').textContent = 'リセット';
});
</script>
</body>
</html>
